# Directive — LLM backend configuration
#
# Copy this file to config.toml and adjust. config.toml is gitignored, so an
# api_key placed there never reaches version control. Every value can also be
# overridden with an environment variable:
#   DIRECTIVE_LLM_BASE_URL, DIRECTIVE_LLM_API_KEY, DIRECTIVE_LLM_MODEL,
#   DIRECTIVE_LLM_TEMPERATURE, DIRECTIVE_LLM_TIMEOUT

[llm]
# Any OpenAI-compatible chat-completions endpoint:
#   LM Studio:      http://localhost:1234/v1
#   Ollama:         http://localhost:11434/v1
#   llama.cpp:      http://localhost:8080/v1
#   OpenRouter:     https://openrouter.ai/api/v1   (needs api_key)
base_url = "http://localhost:1234/v1"

# Leave empty for local servers that need no authentication.
api_key = ""

# The default model for every commander.
model = "qwen/qwen3.6-35b-a3b"

temperature = 0.7
timeout_seconds = 120

# Optional per-role overrides: keys are commander ids (guderian, hoth, kluge,
# strauss, weichs, pavlov, timoshenko, konev, zhukov, and any bench commander
# you promote) plus "staff" for the chief-of-staff weekly report. Roles not
# listed use the default model above. Example — run the staff report and the
# minor commanders on a small fast model, spend the big model where it counts:
#
# [llm.models]
# staff = "qwen/qwen3.5-9b"
# strauss = "qwen/qwen3.5-9b"
# weichs = "qwen/qwen3.5-9b"
# guderian = "glm-4.7-flash"
