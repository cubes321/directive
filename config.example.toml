# Directive — LLM backend configuration
#
# Copy this file to config.toml and adjust. config.toml is gitignored, so an
# api_key placed there never reaches version control. Every value can also be
# overridden with an environment variable:
#   DIRECTIVE_LLM_BASE_URL, DIRECTIVE_LLM_API_KEY, DIRECTIVE_LLM_MODEL,
#   DIRECTIVE_LLM_TEMPERATURE, DIRECTIVE_LLM_TIMEOUT,
#   DIRECTIVE_LLM_MAX_CONCURRENCY
#
# Every setting below is optional — delete any line to use its built-in
# default (shown here as the value). An absent config.toml works fine.

[llm]
# Any OpenAI-compatible chat-completions endpoint:
#   LM Studio:      http://localhost:1234/v1
#   Ollama:         http://localhost:11434/v1
#   llama.cpp:      http://localhost:8080/v1
#   OpenRouter:     https://openrouter.ai/api/v1   (needs api_key)
base_url = "http://localhost:1234/v1"

# Leave empty for local servers that need no authentication.
api_key = ""

# The default model for every commander.
model = "qwen/qwen3.6-35b-a3b"

temperature = 0.7

# Per-request timeout. Local thinking models under load can take minutes;
# a request that exceeds this is dropped and the commander holds position.
timeout_seconds = 300

# Maximum requests sent to the server at once. Set this to your server's real
# parallelism — LM Studio defaults to 3 (shown in `lms ps`). The game queues
# the rest on the client side so they don't time out waiting in the server's
# queue. On a single GPU, raising this past your server's limit only adds
# latency; lowering it to 1-2 reduces per-request variance.
max_concurrency = 3

# Optional per-role overrides: keys are commander ids (guderian, hoth, kluge,
# strauss, weichs, pavlov, timoshenko, konev, zhukov, and any bench commander
# you promote) plus "staff" for the chief-of-staff weekly report. Roles not
# listed use the default model above. Example — run the staff report and the
# minor commanders on a small fast model, spend the big model where it counts:
#
# [llm.models]
# staff = "qwen/qwen3.5-9b"
# strauss = "qwen/qwen3.5-9b"
# weichs = "qwen/qwen3.5-9b"
# guderian = "glm-4.7-flash"

# Optional passthrough of backend-specific request-body fields, merged verbatim
# into every chat-completions call. Use this for knobs the OpenAI-compatible
# shape has no field for. Nested tables map to nested JSON. Absent by default,
# so the request body is untouched — leave it out for backends without such a
# knob. Example — disable Kimi K2's default reasoning (much faster; note
# kimi-k2.6 then requires temperature = 0.6 instead of 1):
#
# [llm.params.thinking]
# type = "disabled"
